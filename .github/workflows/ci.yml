name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet, test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure git identity (needed by integration tests)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
